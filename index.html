<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sriram Ganeshalingam</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --teal: #00d4ff;
  --gold: #f0c040;
  --bg: #0a0f1e;
  --bg2: #0d1426;
  --text: #ffffff;
  --muted: #8892b0;
  --border: rgba(0,212,255,0.2);
  --font: 'Inter', sans-serif;
}

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
}

/* Scanline overlay */
#scanline-overlay {
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.03) 2px,
    rgba(0,0,0,0.03) 4px
  );
  pointer-events: none;
  z-index: 9999;
}

/* HUD counter */
#hud-counter {
  position: fixed;
  top: 24px;
  right: 32px;
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 0.2em;
  color: var(--teal);
  z-index: 1000;
  font-family: var(--font);
  opacity: 0.8;
}

/* Section base */
.section {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 40px;
  opacity: 0;
  pointer-events: none;
  transition: none;
  overflow: hidden;
}
.section.active {
  opacity: 1;
  pointer-events: all;
}

/* Transition flash overlay */
#flash {
  position: fixed;
  inset: 0;
  background: var(--teal);
  opacity: 0;
  pointer-events: none;
  z-index: 500;
}

/* Scroll hint */
#scroll-hint {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 0.7rem;
  letter-spacing: 0.15em;
  color: var(--muted);
  z-index: 100;
  animation: hint-pulse 2s ease-in-out infinite;
}
@keyframes hint-pulse {
  0%, 100% { opacity: 0.4; transform: translateX(-50%) translateY(0); }
  50% { opacity: 1; transform: translateX(-50%) translateY(-4px); }
}

/* Section title style */
.sec-label {
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--teal);
  margin-bottom: 12px;
  opacity: 0;
}
.sec-title {
  font-size: clamp(2rem, 5vw, 3.5rem);
  font-weight: 900;
  line-height: 1.1;
  margin-bottom: 40px;
  opacity: 0;
}
.sec-title span { color: var(--teal); }

/* Utility */
.gold { color: var(--gold); }
.teal { color: var(--teal); }
.muted { color: var(--muted); }
</style>
</head>
<body>
  <div id="hud-counter">01 / 06</div>
  <div id="scanline-overlay"></div>
  <main id="sections">
    <section id="s0" class="section active">HERO</section>
    <section id="s1" class="section">SKILLS</section>
    <section id="s2" class="section">EXPERIENCE</section>
    <section id="s3" class="section">PROJECTS</section>
    <section id="s4" class="section">EDUCATION</section>
    <section id="s5" class="section">CONTACT</section>
  </main>
</body>
</html>
